syntax = "proto3";
package zscout.compass.v1;

service CompassService {
  // Get current heading snapshot
  rpc GetHeading(GetHeadingRequest) returns (HeadingResponse);

  // Stream continuous heading updates at configurable rate
  rpc StreamHeadings(StreamHeadingsRequest) returns (stream HeadingUpdate);

  // Get raw axis values (X, Y, Z) for calibration
  rpc GetRawAxes(GetRawAxesRequest) returns (RawAxesResponse);

  // Health check
  rpc GetStatus(GetStatusRequest) returns (StatusResponse);
}

message GetHeadingRequest {}

message HeadingResponse {
  double heading_degrees = 1;  // 0-360
  int32 x_raw = 2;
  int32 y_raw = 3;
  int32 z_raw = 4;
  double temperature_celsius = 5;
  bool overflow = 6;
  string timestamp_utc = 7;
}

message StreamHeadingsRequest {
  int32 interval_ms = 1;  // default 100 (10 Hz)
}

message HeadingUpdate {
  double heading_degrees = 1;
  int32 x_raw = 2;
  int32 y_raw = 3;
  int32 z_raw = 4;
  double temperature_celsius = 5;
  bool overflow = 6;
  bool data_ready = 7;
  bool data_overrun = 8;
  int32 sample_number = 9;
  string timestamp_utc = 10;
}

message GetRawAxesRequest {}
message RawAxesResponse {
  int32 x_raw = 1;
  int32 y_raw = 2;
  int32 z_raw = 3;
  uint32 status_register = 4;
}

message GetStatusRequest {}
message StatusResponse {
  bool device_found = 1;
  string i2c_bus = 2;
  string device_address = 3;
  bool data_available = 4;
  string status = 5;  // "healthy", "degraded", "unavailable"
}
